<body>
    <h1>function in JS</h1>
    <script>
        function demo() {
            console.log("Hello Dawg");
        }
        demo(); // calling a function

        // with parameter
        function cal(a, b) {
            var num1 = a;
            var num2 = b;
            console.log("Addition of two Number is " + (num1 + num2));
        }
        cal(3, 5);

        // with default parameter
        function add(a, b = 5) {
            var num1 = a;
            var num2 = b;
            var result_1 = num1 + num2;
            console.log("Addition is " + result_1);
        }

        function mul(a, b = 8) {
            var num1 = a;
            var num2 = b;
            var result_2 = num1 * num2;
            console.log("multiplicaton is " + result_2);
        }

        function div(a, b = 9) {
            var num1 = a;
            var num2 = b;
            var result_3 = num1 / num2;
            console.log("division " + result_3);
        }

        add(10);
        mul(23);
        div(45);

        // Annoymus function
        let demo1 = function () {
            console.log("hello");
        }
        demo1();

        let demo2 = () => {
            console.log("hello Dost");
        }
        demo2();

        let demo3 = () => console.log("Autonomus");
        demo3();

        (function () {

        // callback
        function addRes(callback) {
            var num1 = 5;
            var num2 = 9;
            var res = num1 + num2;
            callback(res);
        }
        function result(res) {
            console.log("Addition of two numbers is  " + res);
        }
        addRes(result);

            let age = 35;
            if (age >= 18) {

            }
            else {
                reject("wait for next year");
            }
        });
        myPromises
            .then(result => console.log(result))
            .catch(error => console.log(error))
            .finally(console.log("Done"));
