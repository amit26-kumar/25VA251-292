<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        input {
            width: 60px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Marks Calculator for 3 Students</h2>

    <table>
        <tr>
            <th>Student</th>
            <th>Subject 1</th>
            <th>Subject 2</th>
            <th>Subject 3</th>
            <th>Subject 4</th>
            <th>Subject 5</th>
        </tr>

        <tr>
            <td>Student 1</td>
            <td><input type="number" id="s1m1"></td>
            <td><input type="number" id="s1m2"></td>
            <td><input type="number" id="s1m3"></td>
            <td><input type="number" id="s1m4"></td>
            <td><input type="number" id="s1m5"></td>
        </tr>

        <tr>
            <td>Student 2</td>
            <td><input type="number" id="s2m1"></td>
            <td><input type="number" id="s2m2"></td>
            <td><input type="number" id="s2m3"></td>
            <td><input type="number" id="s2m4"></td>
            <td><input type="number" id="s2m5"></td>
        </tr>

        <tr>
            <td>Student 3</td>
            <td><input type="number" id="s3m1"></td>
            <td><input type="number" id="s3m2"></td>
            <td><input type="number" id="s3m3"></td>
            <td><input type="number" id="s3m4"></td>
            <td><input type="number" id="s3m5"></td>
        </tr>
    </table>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>

    <script>
        function calculate() {
            let output = "<h3>Results</h3>";

            for (let i = 1; i <= 3; i++) {
                let total = 0;

                for (let j = 1; j <= 5; j++) {
                    total += Number(document.getElementById(`s${i}m${j}`).value);
                }

                let percentage = (total / 500) * 100;

                output += `
                    <p>
                        <b>Student ${i}</b><br>
                        Total Marks: ${total}/500<br>
                        Percentage: ${percentage.toFixed(2)}%
                    </p>
                `;
            }

            document.getElementById("result").innerHTML = output;
        }
    </script>

</body>
</html>
